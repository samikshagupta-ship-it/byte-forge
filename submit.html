<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report - Sentinel AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Orbitron', monospace; animation: fadeIn 1s ease-in; }
        .form-container { max-width: 600px; margin: 50px auto; animation: slideUp 1s ease-out; }
        .card { border: 1px solid #00ff00; background-color: #1a1a1a; color: #00ff00; box-shadow: 0 0 20px rgba(0, 255, 0, 0.1); }
        .navbar { background-color: #0a0a0a !important; border-bottom: 1px solid #00ff00; animation: slideDown 0.5s ease-out; }
        .navbar-brand, .nav-link { color: #00ff00 !important; transition: color 0.3s; }
        .navbar-brand:hover, .nav-link:hover { color: #ffffff !important; text-shadow: 0 0 10px #00ff00; }
        .form-control { background-color: #2a2a2a; border: 1px solid #00ff00; color: #00ff00; transition: border-color 0.3s, box-shadow 0.3s; }
        .form-control:focus { background-color: #2a2a2a; border-color: #33ff33; color: #00ff00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.5); }
        .btn-primary { background-color: #00ff00; border-color: #00ff00; color: #000; transition: all 0.3s; }
        .btn-primary:hover { background-color: #33ff33; border-color: #33ff33; box-shadow: 0 0 15px #00ff00; transform: scale(1.05); }
        .btn-primary:active { transform: scale(0.95); }
        .form-label { color: #00ff00; }
        .form-select { background-color: #2a2a2a; border: 1px solid #00ff00; color: #00ff00; }
        .form-select option { background-color: #2a2a2a; color: #00ff00; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Sentinel AI</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/submit">Submit Report</a>
                <a class="nav-link" href="/reports">View Reports</a>
                <a class="nav-link" href="/map">Crime Map</a>
                <a class="nav-link" href="/trends">Trends</a>
            </div>
        </div>
    </nav>

    <div class="container form-container">
        <div class="card">
            <div class="card-header">
                <h3>Submit Anonymous Report</h3>
            </div>
            <div class="card-body">
                <form action="/submit-report" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" name="category" required>
                            <option value="">Select category</option>
                            <option value="harassment">Harassment</option>
                            <option value="theft">Theft</option>
                            <option value="violence">Violence</option>
                            <option value="discrimination">Discrimination</option>
                            <option value="safety">Safety Concern</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="5" required placeholder="Describe the incident in detail..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Location (optional)</label>
                        <input class="form-control" type="text" id="location" name="location" placeholder="e.g., New York, NY or 123 Main St">
                    </div>
                    <div class="mb-3">
                        <label for="file" class="form-label">Attach File (optional)</label>
                        <input class="form-control" type="file" id="file" name="file">
                    </div>
                    <button type="submit" class="btn btn-primary">Submit Report</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
